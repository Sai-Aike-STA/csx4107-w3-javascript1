<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JavaScript Example 01</title>
  </head>
  <body>
    <script>
      let a = 10;
      const b = 'hello';
      var c = 120.11;

      console.log('a ', a);
      console.log('b ', b);
      console.log('c ', c);

      a = 20; // valid
      console.log('a ', a);

      a = 'world'; // also valid
      console.log('a ', a);

      // b = 'Hi there'; // invalid due to const keyword
      console.log('b ', b);
    </script>
  </body>
</html>
